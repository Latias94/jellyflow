name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy,rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check --workspace --locked

      - name: Test
        run: cargo nextest run --workspace --cargo-quiet

      - name: Benchmark smoke
        run: |
          cargo bench -p jellyflow-runtime --bench rendering_query -- --test
          cargo bench -p jellyflow-runtime --bench schema_create_node -- --test

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Dependency boundary smoke
        run: python3 tools/check_no_fret_dependencies.py

      - name: External consumer smoke
        run: python3 tools/check_external_consumer_smoke.py
