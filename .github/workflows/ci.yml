name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            release_gates: true
          - os: macos-15
            release_gates: false
          - os: windows-2025-vs2026
            release_gates: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy,rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Format
        if: matrix.release_gates
        run: cargo fmt --all --check

      - name: Check
        run: cargo check --workspace --locked

      - name: Test
        run: cargo nextest run --workspace --cargo-quiet

      - name: Clippy
        if: matrix.release_gates
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Benchmark smoke
        if: matrix.release_gates
        run: |
          cargo bench -p jellyflow-layout --features benchmark-internals --bench layout_engines -- --test
          cargo bench -p jellyflow-runtime --bench rendering_query -- --test
          cargo bench -p jellyflow-runtime --bench schema_create_node -- --test
          cargo bench -p jellyflow-runtime --bench layout_pipeline -- --test

      - name: Dependency boundary smoke
        if: matrix.release_gates
        run: python3 tools/check_no_fret_dependencies.py

      - name: External consumer smoke
        if: matrix.release_gates
        run: python3 tools/check_external_consumer_smoke.py

      - name: Package file lists
        if: matrix.release_gates
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/package-lists
          crates=(
            jellyflow-core
            jellyflow-layout
            jellyflow-runtime
            jellyflow
            jellyflow-egui
          )
          for crate in "${crates[@]}"; do
            cargo package --locked --no-verify --list -p "$crate" > "target/package-lists/$crate.txt"
          done

      - name: Upload package lists
        if: matrix.release_gates
        uses: actions/upload-artifact@v6
        with:
          name: crate-package-lists
          path: target/package-lists/*.txt

      - name: Diff whitespace check
        if: matrix.release_gates
        run: git diff --check
