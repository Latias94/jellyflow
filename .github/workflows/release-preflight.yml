name: Release Preflight

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.0"
        required: true
        type: string
      source_ref:
        description: "Git ref to validate"
        required: true
        default: "main"
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  versions-and-packages:
    name: versions-and-packages
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy,rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Verify release versions
        run: python3 scripts/release-version.py check --version "${{ inputs.version }}"

      - name: Format
        run: cargo fmt --all --check

      - name: Check
        run: cargo check --workspace --locked

      - name: Test
        run: cargo nextest run --workspace --cargo-quiet

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Benchmark smoke
        run: |
          cargo bench -p jellyflow-runtime --bench rendering_query -- --test
          cargo bench -p jellyflow-runtime --bench schema_create_node -- --test

      - name: Dependency boundary smoke
        run: python3 tools/check_no_fret_dependencies.py

      - name: External consumer smoke
        run: python3 tools/check_external_consumer_smoke.py

      - name: Package file lists
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/package-lists
          crates=(
            jellyflow-core
            jellyflow-layout
            jellyflow-runtime
            jellyflow
          )
          for crate in "${crates[@]}"; do
            cargo package --locked --no-verify --list -p "$crate" > "target/package-lists/$crate.txt"
          done

      - name: Verify leaf package
        run: cargo package --locked -p jellyflow-core

      - name: Diff whitespace check
        run: git diff --check

      - name: Upload package lists
        uses: actions/upload-artifact@v6
        with:
          name: crate-package-lists
          path: target/package-lists/*.txt
